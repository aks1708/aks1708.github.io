---
layout: default
---

<article class="post-content">
    <header class="post-header">
        <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
        <h1 class="post-title gradient-text">{{ page.title }}</h1>
    </header>

    <div class="post-body">
        {{ content }}
    </div>

    <hr style="margin: 3rem 0; border: 0; border-top: 1px solid var(--glass-border);">

    <nav class="post-navigation">
        <a href="{{ '/' | prepend: site.baseurl }}"
            style="color: var(--accent); text-decoration: none; font-weight: 500;">
            &larr; Back to all posts
        </a>
    </nav>
</article>

<style>
    .post-header {
        margin-bottom: 2.5rem;
    }

    .post-title {
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }

    .post-body {
        font-size: 1.1rem;
        line-height: 1.8;
        color: var(--text);
    }

    .post-body h2 {
        margin-top: 2.5rem;
        color: var(--accent);
    }

    .post-body p {
        margin-bottom: 1.5rem;
    }

    .post-body img {
        max-width: 100%;
        border-radius: 0.5rem;
        margin: 2rem 0;
    }
</style>
